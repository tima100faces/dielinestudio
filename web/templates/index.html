<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dieline Studio</title>
<style>
  :root{--bg:#0d1117;--panel:#131a24;--panel2:#0f151d;--line:#222c39;--ink:#e8edf4;
    --muted:#7d8a9c;--cut:#e51a24;--crease:#19a04d;--accent:#3aa0ff;--grid:#172230}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:Inter,"Segoe UI",system-ui,sans-serif;
    display:flex;flex-direction:column;min-height:100%}
  header{padding:14px 22px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  header h1{font-size:15px;font-weight:650;letter-spacing:.02em}
  header .tag{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line);padding:3px 8px;border-radius:4px}
  header .spec{margin-left:auto;font-size:12px;color:var(--muted)}
  header .spec b{color:var(--accent);font-weight:600}
  main{flex:1;display:grid;grid-template-columns:300px 1fr;min-height:0}
  .controls{background:var(--panel);border-right:1px solid var(--line);padding:18px;overflow:auto;display:flex;flex-direction:column;gap:15px}
  .grp>label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
  .field{display:flex;align-items:center;gap:10px}
  .field input[type=range]{flex:1;accent-color:var(--accent);height:3px}
  .vbox{width:80px;display:flex;align-items:center;gap:3px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:5px 7px}
  .vbox input{width:100%;background:transparent;border:0;color:var(--ink);font-size:13px;text-align:right;outline:none}
  .vbox span{font-size:10px;color:var(--muted)}
  .txt{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:8px 9px;color:var(--ink);font-size:13px;outline:none}
  .txt:focus,.vbox:focus-within{border-color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .divide{border-top:1px solid var(--line);margin:2px 0}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--muted)}
  .legend .row{display:flex;align-items:center;gap:8px}
  .legend .sw{width:24px;border-top-width:2px;border-top-style:solid}
  .chk{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink);cursor:pointer;user-select:none}
  .chk input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .downloads{display:flex;flex-direction:column;gap:8px;margin-top:auto}
  .downloads button{font:inherit;font-size:13px;font-weight:600;color:var(--bg);background:var(--accent);border:0;border-radius:7px;padding:10px;cursor:pointer}
  .downloads button:hover{filter:brightness(1.1)}
  .downloads button.alt{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .downloads button.alt:hover{border-color:var(--accent);color:var(--accent);filter:none}
  .stage{position:relative;padding:22px;background:
      linear-gradient(var(--grid) 1px,transparent 1px) 0 0/22px 22px,
      linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/22px 22px,
      radial-gradient(circle at 50% 40%,#16202d,#0a0e14 80%);
    display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0}
  #preview{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  #preview svg{width:100%;height:100%}
  .readout{position:absolute;left:18px;bottom:12px;font-size:11px;color:var(--muted);display:flex;gap:16px}
  .readout b{color:var(--ink);font-weight:600}
  @media(max-width:780px){main{grid-template-columns:1fr;grid-template-rows:auto 1fr}.controls{border-right:0;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<header>
  <h1>Dieline Studio</h1>
  <span class="tag">Pizza / LED box</span>
  <span class="spec">output <b>PDF</b> · layers <b>CUT / CREASE / INFO</b> · mm 1:1</span>
</header>
<main>
  <aside class="controls">
    <div class="grp"><label>Width · W</label>
      <div class="field"><input type="range" id="W_r" min="120" max="650" step="1" value="430">
        <span class="vbox"><input type="number" id="W" value="430"><span>mm</span></span></div></div>
    <div class="grp"><label>Depth · D</label>
      <div class="field"><input type="range" id="D_r" min="120" max="650" step="1" value="260">
        <span class="vbox"><input type="number" id="D" value="260"><span>mm</span></span></div></div>
    <div class="grp"><label>Wall height · H</label>
      <div class="field"><input type="range" id="H_r" min="15" max="120" step="1" value="30">
        <span class="vbox"><input type="number" id="H" value="30"><span>mm</span></span></div></div>
    <div class="grp"><label>Board thickness · t</label>
      <div class="field"><input type="range" id="t_r" min="0.3" max="7" step="0.1" value="1.5">
        <span class="vbox"><input type="number" id="t" value="1.5" step="0.1"><span>mm</span></span></div></div>
    <div class="divide"></div>
    <label class="chk"><input type="checkbox" id="legend"> Legend / title block</label>
    <div class="grp"><label>Title block</label>
      <input class="txt" id="sku" placeholder="SKU / article" value=""></div>
    <div class="row2">
      <input class="txt" id="color" placeholder="Color" value="">
      <span class="vbox" style="width:100%"><span style="color:var(--muted)">&plusmn;</span><input type="number" id="tol" value="5" step="0.5"><span>mm</span></span></div>
    <div class="divide"></div>
    <div class="legend">
      <div class="row"><span class="sw" style="border-color:var(--cut)"></span> Cut</div>
      <div class="row"><span class="sw" style="border-color:var(--crease);border-top-style:dashed"></span> Crease</div></div>
    <div class="downloads"><button id="dl">Download PDF</button>
      <button class="alt" id="dlx">Download DXF (layers)</button></div>
  </aside>
  <section class="stage">
    <div id="preview"></div>
    <div class="readout"><span>Inner: <b id="r-inner">—</b></span><span>Sheet: <b id="r-sheet">—</b></span></div>
  </section>
</main>
<script>
"use strict";
const $=id=>document.getElementById(id);
const params=()=>new URLSearchParams({W:$('W').value,D:$('D').value,H:$('H').value,t:$('t').value,
  sku:$('sku').value,color:$('color').value,tol:$('tol').value,legend:$('legend').checked});
let timer=null;
async function render(){
  const qs=params().toString();
  try{
    const r=await fetch('preview.svg?'+qs);
    $('preview').innerHTML=await r.text();
    const svg=$('preview').querySelector('svg');
    if(svg){const vb=svg.getAttribute('viewBox').split(' ');
      $('r-sheet').textContent=Math.round(vb[2])+' × '+Math.round(vb[3])+' mm';}
    $('r-inner').textContent=$('W').value+' × '+$('D').value+' × '+$('H').value+' mm';
  }catch(e){$('preview').innerHTML='<div style="color:#e51a24;font:13px monospace">'+e+'</div>';}
}
function debounce(){clearTimeout(timer);timer=setTimeout(render,120);}
['W','D','H','t'].forEach(id=>{
  const n=$(id),r=$(id+'_r');
  n.addEventListener('input',()=>{r.value=n.value;debounce();});
  r.addEventListener('input',()=>{n.value=r.value;debounce();});
});
['sku','color','tol'].forEach(id=>$(id).addEventListener('input',debounce));
$('legend').addEventListener('change',render);
$('dl').onclick=()=>{window.location='download.pdf?'+params().toString();};
$('dlx').onclick=()=>{window.location='download.dxf?'+params().toString();};
render();
</script>
</body>
</html>
